scene_id: "demo1_cr_boundary_lure_nominal_v0"
scene_family: "nominal"
seed: 1101

workspace:
  size_x: 12.0
  size_y: 8.0
  size_z: 3.0
  flight_height_min: 0.8
  flight_height_max: 1.6

primitive_budget:
  box: [3, 3]
  cylinder: [0, 0]
  slab: [0, 0]
  perforated_slab: [0, 0]
  sphere: [0, 0]
  capsule: [0, 0]

distribution_modes:
  background: "fixed_demo_layout"
  structure: "fixed_corridor_layout"
  route_adjacent_bias: 1.0
  boundary_adjacent_bias: 0.9

background_placement:
  obstacle_obstacle_min_dist: 0.20
  obstacle_boundary_min_dist: 0.20
  max_rejection_trials: 1
  free_space_fraction_min: 0.30
  free_space_fraction_max: 0.45

templates:
  enabled: false
  min_templates_per_scene: 0
  max_templates_per_scene: 0
  candidate_types: []

template_params: {}

dynamic_obstacles:
  enabled: false
  max_dynamic_count: 0

start_goal:
  start_sampling_mode: "fixed_demo_anchor"
  start_band_min: 0.0
  start_band_max: 0.0
  start_clearance_min: 0.3
  goal_sampling_mode: "fixed_demo_anchor"
  goal_clearance_min: 0.3
  goal_boundary_clearance_min: 0.3
  start_goal_distance_min: 9.0
  start_goal_distance_max: 11.0
  heading_random: false

validation:
  enforce_connectivity: true
  allow_failure_analysis_only: false
  max_overlap_tolerance: 0.0
  require_template_presence: false
  require_start_goal_valid: true
  require_traversable_perforation: false
  validate_dynamic_spawn: false

logging:
  save_scene_json: true
  save_validation_report: true
  save_scene_stats: true

demo_layout:
  layout_id: "demo1_cr_boundary_lure"
  scene_layout_file: "scene_layout.yaml"
  route_options:
    - "risky_short"
    - "safe_long"
  scene_intent: "Two-corridor reward-vs-clearance demonstration."
