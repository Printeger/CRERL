schema_type: "phase11_benchmark_case.v1"
case_id: "injected_ec_v1"
title: "Injected E-C inconsistency benchmark"
description: "Coverage and critical-scene mismatch benchmark intended to surface E-C diagnosis and environment-side repair proposals."
benchmark_class: "injected"
inconsistency_type: "E-C"
scene_family: "boundary_critical"
scene_cfg_name: "scene_cfg_boundary_critical.yaml"
execution_modes:
  - "baseline"
  - "eval"
  - "train"
analysis_modes:
  - "static"
  - "dynamic"
  - "semantic"
  - "report"
  - "repair"
  - "validation"
  - "integration"
spec_refs:
  constraint_spec: "constraint_spec_v0.yaml"
  reward_spec: "reward_spec_v0.yaml"
  policy_spec: "policy_spec_v0.yaml"
env_refs:
  scene_cfg: "scene_cfg_boundary_critical.yaml"
  comparative_scene_cfgs:
    - "scene_cfg_nominal.yaml"
injection:
  enabled: true
  target_component: "environment"
  patch_targets:
    - "scene_cfg_boundary_critical.yaml:validation_rules.required_templates"
    - "scene_cfg_boundary_critical.yaml:distribution_modes.route_adjacent_bias"
expected_signals:
  expected_primary_claim_type: "E-C"
  expected_analyzer_focus:
    - "dynamic"
    - "semantic"
    - "repair"
  expected_validation_targets:
    - "boundary_critical_vs_nominal_success_gap"
    - "boundary_critical_vs_nominal_min_distance_gap"
release:
  include_in_cre_v1_demo: true
