schema_type: "phase11_benchmark_case.v1"
case_id: "injected_er_v1"
title: "Injected E-R inconsistency benchmark"
description: "Shifted robustness benchmark intended to surface E-R diagnosis and robustness-side repair proposals."
benchmark_class: "injected"
inconsistency_type: "E-R"
scene_family: "shifted"
scene_cfg_name: "scene_cfg_shifted.yaml"
execution_modes:
  - "baseline"
  - "eval"
  - "train"
analysis_modes:
  - "static"
  - "dynamic"
  - "semantic"
  - "report"
  - "repair"
  - "validation"
  - "integration"
spec_refs:
  constraint_spec: "constraint_spec_v0.yaml"
  reward_spec: "reward_spec_v0.yaml"
  policy_spec: "policy_spec_v0.yaml"
env_refs:
  scene_cfg: "scene_cfg_shifted.yaml"
  comparative_scene_cfgs:
    - "scene_cfg_nominal.yaml"
injection:
  enabled: true
  target_component: "environment"
  patch_targets:
    - "scene_cfg_shifted.yaml:distribution_modes.shifted_distribution_bias"
    - "scene_cfg_shifted.yaml:validation_rules.require_shifted_semantics"
expected_signals:
  expected_primary_claim_type: "E-R"
  expected_analyzer_focus:
    - "dynamic"
    - "semantic"
    - "repair"
  expected_validation_targets:
    - "nominal_vs_shifted_success_gap"
    - "nominal_vs_shifted_min_distance_gap"
release:
  include_in_cre_v1_demo: true
