scene_id: "nominal_v0"
scene_family: "nominal"
seed: 1001

workspace:
  size_x: 15.0
  size_y: 15.0
  size_z: 4.5
  flight_height_min: 0.5
  flight_height_max: 4.0

primitive_budget:
  box: [1, 3]
  cylinder: [2, 6]
  slab: [0, 1]
  perforated_slab: [0, 1]
  sphere: [0, 0]
  capsule: [0, 0]

distribution_modes:
  background: "constrained_random"
  structure: "template_driven"
  route_adjacent_bias: 0.20
  boundary_adjacent_bias: 0.10

background_placement:
  obstacle_obstacle_min_dist: 0.7
  obstacle_boundary_min_dist: 0.6
  max_rejection_trials: 240
  free_space_fraction_min: 0.55
  free_space_fraction_max: 0.88

templates:
  enabled: true
  min_templates_per_scene: 1
  max_templates_per_scene: 1
  candidate_types:
    - bottleneck
    - clutter_cluster
    - perforated_barrier

template_params:
  bottleneck:
    enabled: true
    count: [0, 1]
    width_range: [1.4, 2.0]
    length_range: [1.2, 2.4]
    placement_mode: "route_adjacent"
    traversable_required: true

  clutter_cluster:
    enabled: true
    count: [0, 1]
    cluster_radius_range: [0.8, 1.6]
    obstacle_count_range: [2, 4]
    placement_mode: "random_free_region"
    traversable_required: true

  perforated_barrier:
    enabled: true
    count: [0, 1]
    slab_mode: "vertical"
    size_x_range: [1.2, 2.2]
    size_y_range: [1.6, 2.6]
    thickness_range: [0.10, 0.16]
    hole_count_range: [1, 1]
    hole_shape_candidates:
      - circle
      - rectangle
    hole_margin_min: 0.20
    hole_spacing_min: 0.20
    placement_mode: "route_adjacent"
    traversable_required: true

dynamic_obstacles:
  enabled: false
  max_dynamic_count: 0

start_goal:
  start_sampling_mode: "inner_boundary_band"
  start_band_min: 0.4
  start_band_max: 1.0
  start_clearance_min: 0.8
  goal_sampling_mode: "interior_free_space"
  goal_clearance_min: 0.8
  goal_boundary_clearance_min: 0.8
  start_goal_distance_min: 4.0
  start_goal_distance_max: 8.0
  heading_random: true

validation:
  enforce_connectivity: true
  allow_failure_analysis_only: false
  max_overlap_tolerance: 0.0
  require_template_presence: true
  require_start_goal_valid: true
  require_traversable_perforation: true
  validate_dynamic_spawn: true
