spec_version: "v0"

policy_type: "velocity_command_uav"
action_type: "continuous"
action_dimensions: 3
action_bounds: [-2.0, 2.0]
command_frame: "goal_aligned_velocity"
yaw_control: false

observations:
  lidar: true
  goal_relative_state: true
  dynamic_obstacle_features: true
  angular_velocity: false
  attitude_features: false
  previous_action: false
  partial_observability: true

control:
  simulator: "Isaac Sim / PhysX"
  control_frequency_hz: 62.5
  dynamic_model: "dynamic multirotor"
  actuation_delay_modeled: true
  sensor_delay_modeled: false

runtime_expectations:
  scene_family_backend_required: true
  cre_runtime_metadata_required: true
  done_type_labels_required: true
  supported_execution_modes:
    - "manual"
    - "train"
    - "eval"
    - "baseline"
  rollout_required_artifacts:
    - "manifest.json"
    - "steps.jsonl"
    - "episodes.jsonl"
    - "summary.json"
    - "acceptance.json"
  static_audit_namespace: "analysis/static"
  static_audit_required_artifacts:
    - "static_report.json"
    - "summary.json"
    - "manifest.json"
    - "namespace_manifest.json"
  dynamic_analysis_namespace: "analysis/dynamic"
  dynamic_analysis_required_artifacts:
    - "dynamic_report.json"
    - "dynamic_evidence.json"
    - "semantic_inputs.json"
    - "summary.json"
    - "manifest.json"
    - "namespace_manifest.json"
  semantic_analysis_namespace: "analysis/semantic"
  semantic_analysis_required_artifacts:
    - "semantic_report.json"
    - "semantic_claims.json"
    - "semantic_input.json"
    - "semantic_summary.md"
    - "semantic_merge_input.json"
    - "claim_consumer.json"
    - "summary.json"
    - "manifest.json"
    - "namespace_manifest.json"
  report_generation_namespace: "analysis/report"
  report_generation_required_artifacts:
    - "report.json"
    - "ranked_findings.json"
    - "repair_handoff.json"
    - "report_summary.md"
    - "summary.json"
    - "manifest.json"
    - "namespace_manifest.json"
  repair_generation_namespace: "analysis/repair"
  repair_generation_required_artifacts:
    - "repair_plan.json"
    - "repair_candidates.json"
    - "spec_patch.json"
    - "spec_patch_preview.json"
    - "validation_context_preview.json"
    - "repair_summary.json"
    - "repair_summary.md"
    - "acceptance.json"
    - "repair_validation.json"
    - "validation_request.json"
    - "manifest.json"
    - "namespace_manifest.json"
  validation_generation_namespace: "analysis/validation"
  validation_generation_required_artifacts:
    - "validation_plan.json"
    - "validation_runs.json"
    - "comparison.json"
    - "validation_decision.json"
    - "post_repair_evidence.json"
    - "validation_summary.json"
    - "validation_summary.md"
    - "manifest.json"
    - "namespace_manifest.json"
  validation_post_repair_evidence_consumer_contract: "phase10_post_repair_evidence_consumer.v2"
  validation_supported_bounded_rerun_adapters:
    - "phase9_bounded_baseline_rerun_adapter.v1"
    - "phase9_bounded_eval_rerun_adapter.v1"
    - "phase9_bounded_train_rerun_adapter.v1"
  validation_default_rerun_mode: "auto"
  validation_preview_fallback_allowed: true
  validation_real_execution_preferred_modes:
    - "baseline"
    - "eval"
    - "train"
  validation_preview_fallback_modes: []
  validation_subprocess_rerun_acceptance_required: true
  validation_claim_specific_decision_required_for:
    - "E-C"
    - "E-R"
  validation_high_order_targets:
    - "nominal_vs_shifted_success_gap"
    - "nominal_vs_shifted_min_distance_gap"
    - "nominal_vs_shifted_collision_gap"
    - "nominal_vs_shifted_near_violation_gap"
    - "nominal_vs_shifted_return_gap"
    - "boundary_critical_vs_nominal_success_gap"
    - "boundary_critical_vs_nominal_min_distance_gap"
  integration_audit_namespace: "analysis/integration"
  integration_audit_required_artifacts:
    - "integration_plan.json"
    - "execution_matrix.json"
    - "run_binding.json"
    - "integration_acceptance.json"
    - "integration_summary.json"
    - "integration_summary.md"
    - "manifest.json"
    - "namespace_manifest.json"
  integration_required_execution_modes:
    - "baseline"
    - "eval"
    - "train"
  integration_direct_scene_binding_required: true
  integration_direct_runtime_metadata_binding_required: true
  integration_direct_repair_preview_binding_required: true
  integration_post_repair_evidence_consumer_contract: "phase10_post_repair_evidence_consumer.v2"
